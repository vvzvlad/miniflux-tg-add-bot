name: Docker Image CI

# No `pull_request` trigger on purpose: a PR build would push to the same
# `:latest` tag that watchtower auto-deploys to prod, so unreviewed branch code
# would go live. Only pushes to master (and manual runs) publish an image.
on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

permissions:
  contents: read   # checkout
  packages: write  # push image to ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: pip install -r requirements-dev.txt

    - name: Lint and type-check
      run: |
        ruff check .
        mypy src

    - name: Run tests
      env:
        # Required ENV so that importing src.settings succeeds
        TELEGRAM_TOKEN: test-token
        MINIFLUX_BASE_URL: http://miniflux.test
        MINIFLUX_API_KEY: test-api-key
        RSS_BRIDGE_URL: http://bridge.test/rss/{channel}/test-token
        ADMIN: test_admin
      run: pytest --tb=short -q

  build:
    runs-on: ubuntu-latest
    needs: test                          # no green tests → no image is built
    steps:
    - uses: actions/checkout@v7

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Compute image tags
      id: tags
      # master -> :latest + :<sha> (watchtower deploys :latest)
      run: |
        echo "tags=ghcr.io/${{ github.repository }}:latest ghcr.io/${{ github.repository }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

    - name: Build the Docker image
      run: |
        tag_args=""
        for tag in ${{ steps.tags.outputs.tags }}; do tag_args="$tag_args --tag $tag"; done
        docker build . --file Dockerfile $tag_args

    - name: Push Docker images
      run: |
        for tag in ${{ steps.tags.outputs.tags }}; do docker push "$tag"; done
